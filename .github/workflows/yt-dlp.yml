name: Download Book to Repo

on:
  workflow_dispatch:
    inputs:
      book_url:
        description: 'URL of the book page (or direct link)'
        required: true
        type: string

jobs:
  download_book:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Create Books Directory
        run: mkdir -p books

      - name: Download Book
        env:
          BOOK_URL: ${{ github.event.inputs.book_url }}
        run: |
          python - << 'EOF'
          import os
          import time
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin, unquote
          import re

          url = os.environ.get('BOOK_URL')
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }
          session = requests.Session()

          # Helper function to fetch page with retries
          def fetch_url(target_url):
              for attempt in range(5):
                  try:
                      print(f"Fetching URL (Attempt {attempt + 1}/5): {target_url}")
                      response = session.get(target_url, headers=headers, allow_redirects=True, timeout=120)
                      response.raise_for_status()
                      return response
                  except Exception as e:
                      print(f"Error fetching URL: {e}")
                      time.sleep(5)
              raise Exception("Failed to fetch URL after 5 attempts.")

          response = fetch_url(url)
          download_url = url
          content_type = response.headers.get('Content-Type', '').lower()

          if 'text/html' in content_type:
              print("HTML page detected, searching for download link...")
              soup = BeautifulSoup(response.text, 'html.parser')
              
              link = soup.find('a', string=re.compile(r'^get$', re.IGNORECASE))
              if not link:
                  link = soup.find('a', href=re.compile(r'\.(pdf|epub|mobi)$', re.IGNORECASE))
              
              if link and link.get('href'):
                  download_url = urljoin(url, link.get('href'))
                  print(f"Found download link: {download_url}")
              else:
                  print("Could not find a specific download link. Trying original URL.")

          # Determine filename
          print(f"Starting download from: {download_url}")
          try:
              head_resp = session.head(download_url, headers=headers, allow_redirects=True, timeout=30)
              if 'Content-Disposition' in head_resp.headers:
                  cd = head_resp.headers.get('Content-Disposition')
                  match = re.search(r'filename="?([^";]+)"?', cd)
                  if match:
                      filename = match.group(1)
                  else:
                      filename = unquote(download_url.split('/')[-1].split('?')[0])
              else:
                  filename = unquote(download_url.split('/')[-1].split('?')[0])
          except:
              filename = unquote(download_url.split('/')[-1].split('?')[0])
          
          if not '.' in filename:
              filename = 'downloaded_book.pdf'

          # Sanitize filename
          filename = re.sub(r'[\\/*?:"<>|]', "", filename)
          filepath = os.path.join('books', filename)

          # Download file with retries
          download_success = False
          for attempt in range(5):
              try:
                  print(f"Downloading file (Attempt {attempt + 1}/5)...")
                  dl_response = session.get(download_url, headers=headers, stream=True, timeout=120)
                  dl_response.raise_for_status()
                  
                  with open(filepath, 'wb') as f:
                      for chunk in dl_response.iter_content(chunk_size=8192):
                          if chunk:
                              f.write(chunk)
                  
                  download_success = True
                  print(f"Successfully downloaded to: {filepath}")
                  break
              except Exception as e:
                  print(f"Download interrupted: {e}")
                  time.sleep(5)
          
          if not download_success:
              raise Exception("Failed to download file completely after 5 attempts.")
          EOF

      - name: Commit and Push Book
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add books/
          
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add downloaded book"
            git push
            echo "Book successfully pushed to repository."
          fi
