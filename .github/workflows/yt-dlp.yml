name: Download Book

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Book page URL'
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests beautifulsoup4

      - name: Download book
        env:
          BOOK_URL: ${{ github.event.inputs.url }}
        run: |
          python3 << 'SCRIPT'
          import os, re, json, time, sys, requests
          from urllib.parse import urljoin
          from bs4 import BeautifulSoup

          URL = os.environ["BOOK_URL"].strip()
          BOOKS_DIR = "books"
          CACHE_FILE = ".url_cache.json"
          MAX_ATTEMPTS = 10
          EXTENSIONS = (".pdf", ".epub", ".mobi", ".djvu", ".azw3", ".fb2")

          os.makedirs(BOOKS_DIR, exist_ok=True)

          cache = {}
          if os.path.exists(CACHE_FILE):
              with open(CACHE_FILE) as f:
                  cache = json.load(f)

          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          })

          def format_size(b):
              for u in ["B", "KB", "MB", "GB"]:
                  if b < 1024:
                      return f"{b:.1f} {u}"
                  b /= 1024
              return f"{b:.1f} TB"

          def get_filename(resp, url):
              cd = resp.headers.get("Content-Disposition", "")
              m = re.search(r'filename[*]?=["\']?(?:UTF-8\'\')?([^";\r\n]+)', cd, re.IGNORECASE)
              if m:
                  return m.group(1).strip().strip('"').strip("'")
              path = url.split("?")[0].split("/")[-1]
              if path:
                  return requests.utils.unquote(path)
              return "book.pdf"

          # Resolve download URL
          if URL in cache:
              download_url = cache[URL]["url"]
              filename = cache[URL]["filename"]
              print(f"Cache hit: {filename}")
          else:
              print(f"Fetching page: {URL}")
              resp = session.get(URL, timeout=30)
              resp.raise_for_status()
              soup = BeautifulSoup(resp.text, "html.parser")

              link = None
              for a in soup.find_all("a", href=True):
                  href = a["href"].lower().split("?")[0]
                  if any(href.endswith(ext) for ext in EXTENSIONS):
                      link = a
                      break

              if not link:
                  print("Page HTML (first 2000 chars):")
                  print(resp.text[:2000])
                  sys.exit("ERROR: No download link found on page")

              download_url = urljoin(URL, link["href"])
              print(f"Found link: {download_url}")

              head = session.head(download_url, allow_redirects=True, timeout=30)
              filename = get_filename(head, str(head.url))

              cache[URL] = {"url": download_url, "filename": filename}
              with open(CACHE_FILE, "w") as f:
                  json.dump(cache, f, indent=2)

          filepath = os.path.join(BOOKS_DIR, filename)
          print(f"Target: {filepath}")

          if os.path.exists(filepath) and os.path.getsize(filepath) > 0:
              print(f"Already exists ({format_size(os.path.getsize(filepath))}), skipping.")
              sys.exit(0)

          # Download with retry and resume
          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  existing = os.path.getsize(filepath) if os.path.exists(filepath) else 0
                  headers = {}
                  if existing > 0:
                      headers["Range"] = f"bytes={existing}-"
                      print(f"Resuming from {format_size(existing)}")

                  resp = session.get(download_url, headers=headers, stream=True, timeout=60)

                  # If server doesn't support range, start over
                  if existing > 0 and resp.status_code == 200:
                      print("Server doesn't support resume, restarting...")
                      existing = 0
                  elif resp.status_code not in (200, 206):
                      raise Exception(f"HTTP {resp.status_code}")

                  total = int(resp.headers.get("Content-Length", 0)) + existing
                  downloaded = existing
                  start = time.time()
                  mode = "ab" if resp.status_code == 206 else "wb"

                  with open(filepath, mode) as f:
                      for chunk in resp.iter_content(chunk_size=65536):
                          if chunk:
                              f.write(chunk)
                              downloaded += len(chunk)
                              elapsed = time.time() - start or 0.001
                              speed = (downloaded - existing) / elapsed
                              pct = (downloaded / total * 100) if total else 0
                              eta = ((total - downloaded) / speed) if speed > 0 and total else 0
                              mins, secs = divmod(int(eta), 60)
                              print(f"\r  {pct:5.1f}% | {format_size(downloaded)}/{format_size(total)} | {format_size(speed)}/s | ETA {mins}m{secs}s   ", end="", flush=True)

                  final_size = os.path.getsize(filepath)
                  if final_size == 0:
                      os.remove(filepath)
                      raise Exception("Downloaded file is empty")

                  print(f"\nDone: {filename} ({format_size(final_size)})")
                  sys.exit(0)

              except (requests.exceptions.RequestException, Exception) as e:
                  wait = min(2 ** attempt, 60)
                  print(f"\nAttempt {attempt}/{MAX_ATTEMPTS} failed: {e}")
                  if attempt < MAX_ATTEMPTS:
                      print(f"Retrying in {wait}s...")
                      time.sleep(wait)

          # Clean up partial file on total failure
          if os.path.exists(filepath):
              os.remove(filepath)
          sys.exit("ERROR: Download failed after all attempts")
          SCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books/ .url_cache.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Add book: $(ls books/ | tail -1)"
            git push
          fi
