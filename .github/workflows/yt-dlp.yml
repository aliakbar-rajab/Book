name: Download Book

on:
  workflow_dispatch:
    inputs:
      book_url:
        description: "Book URL"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Download book
        env:
          BOOK_URL: ${{ inputs.book_url }}
        run: |
          python << 'PYTHON'
          import os
          import re
          import json
          import time
          import hashlib
          from pathlib import Path
          from urllib.parse import urljoin, unquote

          import requests
          from bs4 import BeautifulSoup

          BOOK_URL = os.environ["BOOK_URL"].strip()

          USER_AGENT = (
              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) "
              "Chrome/124.0 Safari/537.36"
          )

          EXTENSIONS = [".epub", ".pdf", ".mobi", ".azw3", ".fb2"]
          MAX_RETRIES = 5

          session = requests.Session()
          session.headers.update({
              "User-Agent": USER_AGENT
          })

          books_dir = Path("books")
          books_dir.mkdir(exist_ok=True)

          cache_file = Path("download_cache.json")

          if cache_file.exists():
              try:
                  cache = json.loads(cache_file.read_text(encoding="utf-8"))
              except:
                  cache = {}
          else:
              cache = {}

          url_hash = hashlib.md5(BOOK_URL.encode()).hexdigest()

          if url_hash in cache:
              print("Already downloaded")
              raise SystemExit(0)

          def sanitize(name):
              return re.sub(r'[<>:"/\\|?*]+', '_', name).strip()

          def detect_extension(content_type, filename=""):
              ct = content_type.lower()

              if filename:
                  for ext in EXTENSIONS:
                      if filename.lower().endswith(ext):
                          return ext

              if "pdf" in ct:
                  return ".pdf"

              if "epub" in ct or "zip" in ct:
                  return ".epub"

              if "mobi" in ct:
                  return ".mobi"

              return ".epub"

          def extract_filename(response, url):
              cd = response.headers.get("content-disposition", "")

              match = re.search(
                  r'filename\*?=(?:UTF-8\'\')?["\']?([^"\';]+)',
                  cd,
                  re.I
              )

              if match:
                  return sanitize(unquote(match.group(1)))

              name = sanitize(unquote(url.split("/")[-1]))

              if any(name.lower().endswith(x) for x in EXTENSIONS):
                  return name

              ext = detect_extension(response.headers.get("content-type", ""))
              return f"book_{int(time.time())}{ext}"

          def save_response_content(response, path):
              with open(path, "wb") as f:
                  for chunk in response.iter_content(chunk_size=65536):
                      if chunk:
                          f.write(chunk)

              if path.stat().st_size == 0:
                  raise Exception("Downloaded file is empty")

          def is_html(response, first_bytes):
              ct = response.headers.get("content-type", "").lower()

              if "text/html" in ct:
                  return True

              try:
                  text = first_bytes.decode("utf-8", errors="ignore").lower()

                  if "<html" in text or "<!doctype" in text:
                      return True
              except:
                  pass

              return False

          def find_download_link(html, base_url):
              soup = BeautifulSoup(html, "lxml")

              candidates = []

              for tag in soup.find_all("a", href=True):
                  href = tag["href"]

                  if any(ext in href.lower() for ext in EXTENSIONS):
                      candidates.append(href)

                  if "get.php" in href.lower():
                      candidates.append(href)

                  if "/ads.php" in href.lower():
                      candidates.append(href)

              regex_patterns = [
                  r'https?://[^\s"\']+get\.php[^\s"\']*',
                  r'/get\.php[^\s"\']*',
                  r'https?://[^\s"\']+\.(?:epub|pdf|mobi|azw3|fb2)',
              ]

              for pattern in regex_patterns:
                  matches = re.findall(pattern, html, re.I)
                  candidates.extend(matches)

              seen = set()

              for candidate in candidates:
                  full = urljoin(base_url, candidate)

                  if full in seen:
                      continue

                  seen.add(full)

                  try:
                      head = session.get(
                          full,
                          allow_redirects=True,
                          timeout=30,
                          stream=True
                      )

                      content_type = head.headers.get("content-type", "").lower()

                      if (
                          "application" in content_type
                          or "octet-stream" in content_type
                          or any(ext in full.lower() for ext in EXTENSIONS)
                      ):
                          return full

                  except:
                      pass

              return None

          final_error = None

          for attempt in range(1, MAX_RETRIES + 1):
              try:
                  print(f"Attempt {attempt}/{MAX_RETRIES}")
                  print(f"URL: {BOOK_URL}")

                  response = session.get(
                      BOOK_URL,
                      allow_redirects=True,
                      stream=True,
                      timeout=60
                  )

                  response.raise_for_status()

                  first_chunk = next(response.iter_content(4096), b"")

                  if not is_html(response, first_chunk):
                      print("Direct file detected")

                      filename = extract_filename(response, response.url)
                      filepath = books_dir / filename

                      with open(filepath, "wb") as f:
                          if first_chunk:
                              f.write(first_chunk)

                          for chunk in response.iter_content(chunk_size=65536):
                              if chunk:
                                  f.write(chunk)

                      if filepath.stat().st_size == 0:
                          raise Exception("File is empty")

                      cache[url_hash] = filename
                      cache_file.write_text(
                          json.dumps(cache, indent=2),
                          encoding="utf-8"
                      )

                      print(f"Saved: {filepath}")
                      break

                  print("HTML page detected")

                  html = first_chunk.decode("utf-8", errors="ignore")
                  html += response.text

                  download_link = find_download_link(html, response.url)

                  if not download_link:
                      print(html[:4000])
                      raise Exception("No valid download link found")

                  print(f"Download link: {download_link}")

                  file_response = session.get(
                      download_link,
                      allow_redirects=True,
                      stream=True,
                      timeout=120
                  )

                  file_response.raise_for_status()

                  filename = extract_filename(
                      file_response,
                      file_response.url
                  )

                  filepath = books_dir / filename

                  save_response_content(file_response, filepath)

                  cache[url_hash] = filename
                  cache_file.write_text(
                      json.dumps(cache, indent=2),
                      encoding="utf-8"
                  )

                  print(f"Saved: {filepath}")
                  break

              except Exception as e:
                  final_error = e
                  print(f"ERROR: {e}")

                  if attempt < MAX_RETRIES:
                      wait = min(2 ** attempt, 30)
                      print(f"Retrying in {wait}s")
                      time.sleep(wait)

          else:
              raise final_error

          PYTHON

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add books download_cache.json

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add downloaded book"
          git push
