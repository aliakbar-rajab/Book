name: Download Book to Repo

on:
  workflow_dispatch:
    inputs:
      book_url:
        description: 'URL of the book page (or direct link)'
        required: true
        type: string

jobs:
  download_book:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Create Books Directory
        run: mkdir -p books

      - name: Download Book
        env:
          BOOK_URL: ${{ github.event.inputs.book_url }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin
          import re
          from urllib.parse import unquote

          url = os.environ.get('BOOK_URL')
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }
          session = requests.Session()

          print(f"Fetching initial URL: {url}")
          response = session.get(url, headers=headers, allow_redirects=True, timeout=120)
          response.raise_for_status()

          download_url = url
          content_type = response.headers.get('Content-Type', '').lower()

          if 'text/html' in content_type:
              print("HTML page detected, searching for download link...")
              soup = BeautifulSoup(response.text, 'html.parser')
              
              link = soup.find('a', string=re.compile(r'^get$', re.IGNORECASE))
              if not link:
                  link = soup.find('a', href=re.compile(r'\.(pdf|epub|mobi)$', re.IGNORECASE))
              
              if link and link.get('href'):
                  download_url = urljoin(url, link.get('href'))
                  print(f"Found download link: {download_url}")
              else:
                  print("Could not find a specific download link. Trying original URL.")

          print(f"Starting download from: {download_url}")
          dl_response = session.get(download_url, headers=headers, stream=True, timeout=120)
          dl_response.raise_for_status()

          filename = 'downloaded_book.pdf'
          if 'Content-Disposition' in dl_response.headers:
              cd = dl_response.headers.get('Content-Disposition')
              match = re.search(r'filename="?([^";]+)"?', cd)
              if match:
                  filename = match.group(1)
          else:
              parsed_name = unquote(download_url.split('/')[-1].split('?')[0])
              if '.' in parsed_name:
                  filename = parsed_name

          # Sanitize filename
          filename = re.sub(r'[\\/*?:"<>|]', "", filename)
          
          # Save inside the 'books' folder
          filepath = os.path.join('books', filename)

          with open(filepath, 'wb') as f:
              for chunk in dl_response.iter_content(chunk_size=8192):
                  if chunk:
                      f.write(chunk)

          print(f"Successfully downloaded to: {filepath}")
          EOF

      - name: Commit and Push Book
        run: |
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add the books folder
          git add books/
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add downloaded book"
            git push
            echo "Book successfully pushed to repository."
          fi
