name: Download Book

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Book page URL'
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests beautifulsoup4

      - name: Download book
        env:
          BOOK_URL: ${{ github.event.inputs.url }}
        run: |
          python3 << 'EOF'
          import os, json, time, sys, requests
          from urllib.parse import urljoin
          from bs4 import BeautifulSoup

          URL = os.environ["BOOK_URL"]
          BOOKS_DIR = "books"
          CACHE_FILE = ".url_cache.json"
          MAX_ATTEMPTS = 10
          os.makedirs(BOOKS_DIR, exist_ok=True)

          cache = {}
          if os.path.exists(CACHE_FILE):
              with open(CACHE_FILE) as f:
                  cache = json.load(f)

          session = requests.Session()
          session.headers.update({"User-Agent": "Mozilla/5.0"})

          def format_size(b):
              for u in ["B","KB","MB","GB"]:
                  if b < 1024: return f"{b:.1f}{u}"
                  b /= 1024
              return f"{b:.1f}TB"

          def format_eta(s):
              if s < 60: return f"{int(s)}s"
              if s < 3600: return f"{int(s//60)}m{int(s%60)}s"
              return f"{int(s//3600)}h{int((s%3600)//60)}m"

          def get_filename(resp, url):
              cd = resp.headers.get("Content-Disposition", "")
              m = __import__("re").search(r'filename="?([^";\n]+)"?', cd)
              if m: return m.group(1).strip()
              return url.split("?")[0].split("/")[-1]

          if URL in cache:
              download_url = cache[URL]["url"]
              filename = cache[URL]["filename"]
          else:
              resp = session.get(URL)
              soup = BeautifulSoup(resp.text, "html.parser")
              link = soup.find("a", href=lambda h: h and any(h.endswith(e) for e in [".pdf",".epub",".mobi",".djvu"]))
              if not link:
                  sys.exit("No download link found")
              download_url = urljoin(URL, link["href"])
              head = session.head(download_url, allow_redirects=True)
              filename = get_filename(head, download_url)
              cache[URL] = {"url": download_url, "filename": filename}
              with open(CACHE_FILE, "w") as f:
                  json.dump(cache, f)


          filepath = os.path.join(BOOKS_DIR, filename)

          if os.path.exists(filepath) and os.path.getsize(filepath) > 0:
              print("Already exists")
              sys.exit(0)

          for attempt in range(1, MAX_ATTEMPTS + 1):
              try:
                  existing = os.path.getsize(filepath) if os.path.exists(filepath) else 0
                  headers = {"Range": f"bytes={existing}-"} if existing else {}
                  resp = session.get(download_url, headers=headers, stream=True)
                  total = existing + int(resp.headers.get("Content-Length", 0))
                  downloaded = existing
                  start = time.time()
                  last_print = 0
                  with open(filepath, "ab") as f:
                      for chunk in resp.iter_content(8192):
                          if chunk:
                              f.write(chunk)
                              downloaded += len(chunk)
                              now = time.time()
                              if now - last_print >= 0.5:
                                  elapsed = now - start or 0.001
                                  speed = (downloaded - existing) / elapsed
                                  pct = downloaded / total * 100 if total else 0
                                  eta = (total - downloaded) / speed if speed and total else 0
                                  print(f"\r{pct:.1f}% {format_size(downloaded)}/{format_size(total)} {format_size(speed)}/s ETA:{format_eta(eta)}", end="")
                                  last_print = now
                  print(f"\nDone: {filename}")
                  sys.exit(0)
              except Exception as e:
                  wait = min(2 ** attempt, 30)
                  print(f"\nAttempt {attempt} failed: {e}. Retrying in {wait}s...")
                  time.sleep(wait)

          sys.exit("Download failed after all attempts")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add books/ .url_cache.json
          git diff --cached --quiet || git commit -m "Add book"
          git push
