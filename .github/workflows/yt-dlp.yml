      - name: Download Book
        env:
          BOOK_URL: ${{ inputs.book_url }}
        run: |
          python - << 'EOF'
          import os
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin
          
          url = os.environ["BOOK_URL"]
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
          
          print(f"Fetching {url}...")
          session = requests.Session()
          response = session.get(url, headers=headers, allow_redirects=True)
          response.raise_for_status()
          
          # If the URL is already a direct file, download it
          content_type = response.headers.get("Content-Type", "")
          if "application/pdf" in content_type or "application/epub+zip" in content_type:
              download_url = url
          else:
              # It is an intermediary page, parse it to find the download link
              soup = BeautifulSoup(response.text, "html.parser")
              download_link = None
              
              for a in soup.find_all("a", href=True):
                  text = a.text.lower()
                  href = a["href"]
                  if text == "get" or href.endswith(".pdf") or href.endswith(".epub"):
                      download_link = urljoin(url, href)
                      break
              
              if not download_link:
                  # Fallback: Sometimes the provided URL IS the download endpoint but lacks headers initially
                  download_link = url
              
              print(f"Found direct link: {download_link}")
              download_url = download_link
              response = session.get(download_url, headers=headers, stream=True)
              response.raise_for_status()
          
          # Extract filename
          filename = "downloaded_book"
          cd = response.headers.get("content-disposition")
          if cd and "filename=" in cd:
              filename = cd.split("filename=")[1].strip("\"'")
          else:
              filename = download_url.split("/")[-1].split("?")[0]
              if not filename.endswith((".pdf", ".epub")):
                  filename += ".pdf" # Default fallback
          
          print(f"Downloading to {filename}...")
          with open(filename, "wb") as f:
              for chunk in response.iter_content(chunk_size=8192):
                  f.write(chunk)
          
          print("Download complete.")
          with open("output_filename.txt", "w") as f:
              f.write(filename)
          EOF
