name: Download Book to Repo

on:
  workflow_dispatch:
    inputs:
      book_url:
        description: 'URL of the book page (or direct link)'
        required: true
        type: string

jobs:
  download_book:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Create Books Directory
        run: mkdir -p books

      - name: Download Book
        env:
          BOOK_URL: ${{ github.event.inputs.book_url }}
        run: |
          python - << 'EOF'
          import os
          import time
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin, unquote
          import re

          url = os.environ.get('BOOK_URL')
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'
          }
          session = requests.Session()

          def fetch_html(target_url):
              for attempt in range(5):
                  try:
                      print(f"Fetching page (Attempt {attempt + 1}/5): {target_url}")
                      response = session.get(target_url, headers=headers, allow_redirects=True, timeout=30)
                      response.raise_for_status()
                      return response
                  except Exception as e:
                      print(f"Error: {e}")
                      time.sleep(5)
              raise Exception("Failed to fetch page after 5 attempts.")

          def download_with_resume(download_url, filepath, max_attempts=10):
              """Download a file with resume support using HTTP Range requests."""
              for attempt in range(max_attempts):
                  # Check how many bytes we already have
                  existing_bytes = os.path.getsize(filepath) if os.path.exists(filepath) else 0

                  req_headers = {**headers}
                  if existing_bytes > 0:
                      req_headers['Range'] = f'bytes={existing_bytes}-'
                      print(f"Resuming from byte {existing_bytes} (Attempt {attempt + 1}/{max_attempts})...")
                  else:
                      print(f"Starting download (Attempt {attempt + 1}/{max_attempts})...")

                  try:
                      resp = session.get(
                          download_url,
                          headers=req_headers,
                          stream=True,
                          timeout=60  # per-chunk timeout, not total
                      )

                      # 206 = partial content (resume), 200 = full content
                      if resp.status_code == 200 and existing_bytes > 0:
                          # Server doesn't support Range, restart from scratch
                          print("Server doesn't support resume, restarting...")
                          existing_bytes = 0

                      resp.raise_for_status()

                      mode = 'ab' if existing_bytes > 0 and resp.status_code == 206 else 'wb'
                      with open(filepath, mode) as f:
                          for chunk in resp.iter_content(chunk_size=65536):
                              if chunk:
                                  f.write(chunk)

                      print(f"Download complete: {filepath}")
                      return True

                  except Exception as e:
                      print(f"Download interrupted at byte "
                            f"{os.path.getsize(filepath) if os.path.exists(filepath) else 0}: {e}")
                      wait = min(30, 5 * (attempt + 1))
                      print(f"Waiting {wait}s before retry...")
                      time.sleep(wait)

              return False

          # --- Resolve download URL ---
          response = fetch_html(url)
          download_url = url
          content_type = response.headers.get('Content-Type', '').lower()

          if 'text/html' in content_type:
              print("HTML page detected, searching for download link...")
              soup = BeautifulSoup(response.text, 'html.parser')

              link = soup.find('a', string=re.compile(r'^get$', re.IGNORECASE))
              if not link:
                  link = soup.find('a', href=re.compile(r'\.(pdf|epub|mobi)$', re.IGNORECASE))

              if link and link.get('href'):
                  download_url = urljoin(url, link.get('href'))
                  print(f"Found download link: {download_url}")
              else:
                  print("No specific download link found, trying original URL.")

          # --- Determine filename ---
          print(f"Resolving filename from: {download_url}")
          filename = None
          try:
              head_resp = session.head(download_url, headers=headers, allow_redirects=True, timeout=30)
              cd = head_resp.headers.get('Content-Disposition', '')
              match = re.search(r'filename\*?=(?:UTF-8\'\')?["\']?([^"\';\r\n]+)', cd, re.IGNORECASE)
              if match:
                  filename = unquote(match.group(1).strip())
          except Exception as e:
              print(f"HEAD request failed: {e}")

          if not filename:
              filename = unquote(download_url.split('/')[-1].split('?')[0])
          if '.' not in filename:
              filename = 'downloaded_book.pdf'

          filename = re.sub(r'[\\/*?:"<>|]', "", filename).strip()
          filepath = os.path.join('books', filename)
          print(f"Saving to: {filepath}")

          # --- Download ---
          success = download_with_resume(download_url, filepath, max_attempts=10)
          if not success:
              raise Exception("Failed to download file after all attempts.")
          EOF

      - name: Commit and Push Book
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add books/

          if git diff --cached --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add downloaded book"
            git push
            echo "Book successfully pushed to repository."
          fi
