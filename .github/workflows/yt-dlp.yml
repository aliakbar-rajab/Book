name: Download Book File

on:
  workflow_dispatch:
    inputs:
      book_url:
        description: 'Direct download URL for the book'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Create download directory
        run: mkdir downloads

      - name: Download the file
        run: |
          cd downloads
          # wget --content-disposition tries to get the original filename from the server headers
          wget --content-disposition "${{ inputs.book_url }}"

      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Book-File
          path: downloads/
