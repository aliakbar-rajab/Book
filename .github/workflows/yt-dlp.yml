name: Download Books

on:
  workflow_dispatch:
    inputs:
      book_url:
        description: 'Book download URL or Libgen MD5 hash'
        required: true
        type: string
      expected_md5:
        description: 'Expected MD5 hash (optional, for integrity check)'
        required: false
        type: string
      output_dir:
        description: 'Output directory (default: downloads)'
        required: false
        default: 'downloads'
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml tqdm urllib3

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: |
            .download_cache
          key: libgen-cache-${{ github.run_id }}
          restore-keys: |
            libgen-cache-

      - name: Download book
        env:
          BOOK_URL: ${{ github.event.inputs.book_url }}
          EXPECTED_MD5: ${{ github.event.inputs.expected_md5 }}
          OUTPUT_DIR: ${{ github.event.inputs.output_dir }}
        run: python scripts/download.py

      - name: Save download cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .download_cache
          key: libgen-cache-${{ github.run_id }}

      - name: Configure Git LFS for large files
        run: |
          if [ -d "${{ github.event.inputs.output_dir || 'downloads' }}" ]; then
            sudo apt-get install -y git-lfs
            git lfs install
            git lfs track "*.pdf" "*.epub" "*.mobi" "*.azw3" "*.djvu" "*.zip"
            git add .gitattributes || true
          fi

      - name: Commit downloaded book
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "📚 Download: ${{ github.event.inputs.book_url }}"
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
          fi
