name: Download Book

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Book URL'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download book
        run: |
          python - "${{ github.event.inputs.url }}" << 'EOF'
          import sys
          import os
          import re
          import time
          import json
          import requests

          BOOKS_DIR = "books"
          CACHE_FILE = ".url_cache.json"
          os.makedirs(BOOKS_DIR, exist_ok=True)

          def load_cache():
              if os.path.exists(CACHE_FILE):
                  with open(CACHE_FILE) as f:
                      return json.load(f)
              return {}

          def save_cache(cache):
              with open(CACHE_FILE, "w") as f:
                  json.dump(cache, f, indent=2)

          def format_size(b):
              for unit in ("B", "KiB", "MiB", "GiB"):
                  if b < 1024:
                      return f"{b:.1f} {unit}"
                  b /= 1024
              return f"{b:.1f} TiB"

          def format_eta(seconds):
              if seconds < 60:
                  return f"{int(seconds)}s"
              elif seconds < 3600:
                  return f"{int(seconds//60)}m{int(seconds%60)}s"
              else:
                  return f"{int(seconds//3600)}h{int((seconds%3600)//60)}m"

          def print_progress(downloaded, total, speed, elapsed):
              if total:
                  pct = downloaded / total * 100
                  eta = (total - downloaded) / speed if speed > 0 else 0
                  bar_len = 30
                  filled = int(bar_len * downloaded / total)
                  bar = "█" * filled + "░" * (bar_len - filled)
                  print(
                      f"\r[{bar}] {pct:5.1f}% of {format_size(total)}"
                      f" at {format_size(speed)}/s ETA {format_eta(eta)}",
                      end="", flush=True
                  )
              else:
                  print(f"\r{format_size(downloaded)} downloaded at {format_size(speed)}/s", end="", flush=True)

          def fetch_html(session, url, max_attempts=5):
              for attempt in range(max_attempts):
                  try:
                      resp = session.get(url, timeout=30)
                      resp.raise_for_status()
                      return resp.text
                  except Exception as e:
                      if attempt < max_attempts - 1:
                          time.sleep(5)
                      else:
                          raise

          def resolve_filename(session, url, cache):
              if url in cache:
                  return cache[url]
              try:
                  resp = session.head(url, timeout=15, allow_redirects=True)
                  cd = resp.headers.get("Content-Disposition", "")
                  m = re.search(r"filename\*=UTF-8''(.+)", cd) or re.search(r'filename="?([^"]+)"?', cd)
                  if m:
                      from urllib.parse import unquote
                      name = unquote(m.group(1).strip())
                  else:
                      name = url.split("/")[-1].split("?")[0] or "book"
              except Exception:
                  name = url.split("/")[-1].split("?")[0] or "book"
              cache[url] = name
              save_cache(cache)
              return name

          def download_with_resume(session, url, filepath, max_attempts=10):
              for attempt in range(max_attempts):
                  try:
                      existing = os.path.getsize(filepath) if os.path.exists(filepath) else 0
                      headers = {"Range": f"bytes={existing}-"} if existing else {}
                      resp = session.get(url, headers=headers, stream=True, timeout=60)

                      if existing and resp.status_code == 200:
                          existing = 0  # server doesn't support resume, restart

                      resp.raise_for_status()

                      total = int(resp.headers.get("Content-Length", 0))
                      if existing:
                          total += existing

                      mode = "ab" if existing else "wb"
                      downloaded = existing
                      start = time.time()
                      last_time = start
                      last_bytes = existing
                      speed = 0

                      with open(filepath, mode) as f:
                          for chunk in resp.iter_content(chunk_size=65536):
                              if chunk:
                                  f.write(chunk)
                                  downloaded += len(chunk)
                                  now = time.time()
                                  if now - last_time >= 0.5:
                                      speed = (downloaded - last_bytes) / (now - last_time)
                                      last_time = now
                                      last_bytes = downloaded
                                  print_progress(downloaded, total, speed, now - start)

                      print()  # newline after progress bar
                      return

                  except Exception as e:
                      print(f"\nAttempt {attempt+1} failed: {e}")
                      if attempt < max_attempts - 1:
                          wait = min(30, 5 * (attempt + 1))
                          print(f"Retrying in {wait}s...")
                          time.sleep(wait)
                      else:
                          raise

          # --- main ---
          url = sys.argv[1]
          session = requests.Session()
          cache = load_cache()

          print(f"Resolving filename for: {url}")
          filename = resolve_filename(session, url, cache)
          filepath = os.path.join(BOOKS_DIR, filename)

          if os.path.exists(filepath) and os.path.getsize(filepath) > 0:
              print(f"Already exists, skipping: {filename}")
              sys.exit(0)

          print(f"Downloading: {filename}")
          download_with_resume(session, url, filepath)
          print(f"Saved to: {filepath}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add books/ .url_cache.json
          git diff --cached --quiet || git commit -m "Add: ${{ github.event.inputs.url }}"
          git push
