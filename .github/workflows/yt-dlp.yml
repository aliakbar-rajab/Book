name: Download Book

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Book page URL'
        required: true

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests beautifulsoup4

      - name: Download book
        run: |
          python3 << 'EOF'
          import os, json, time, re, requests
          from bs4 import BeautifulSoup

          URL = "${{ github.event.inputs.url }}"BOOKS_DIR = "books"
          CACHE_FILE = ".url_cache.json"
          os.makedirs(BOOKS_DIR, exist_ok=True)

          cache = {}
          if os.path.exists(CACHE_FILE):
              with open(CACHE_FILE) as f:
                  cache = json.load(f)

          session = requests.Session()
          session.headers["User-Agent"] = "Mozilla/5.0"

          def format_size(b):
              for u in ["B","KB","MB","GB"]:
                  if b < 1024: return f"{b:.1f}{u}"
                  b /= 1024
              return f"{b:.1f}TB"

          def format_eta(s):
              if s < 60: return f"{int(s)}s"
              if s < 3600: return f"{int(s//60)}m{int(s%60)}s"
              return f"{int(s//3600)}h{int((s%3600)//60)}m"

          def get_filename(resp):
              cd = resp.headers.get("Content-Disposition", "")
              m = re.search(r'filename\*?=["\']?(?:UTF-8\'\')?([^"\';\n]+)', cd, re.I)
              if m:
                  return re.sub(r'[\\/*?:"<>|]', "_", m.group(1).strip())
              return os.path.basename(resp.url.split("?")[0]) or "book"

          # Resolve download link
          if URL in cache:
              download_url, filename = cache[URL]["url"], cache[URL]["filename"]else:
              r = session.get(URL, timeout=(10, 30))
              soup = BeautifulSoup(r.text, "html.parser")
              link = soup.find("a", href=re.compile(r'\.(pdf|epub|mobi|djvu)', re.I))
              if not link:
                  raise SystemExit("No download link found on page")
              download_url = requests.compat.urljoin(URL, link["href"])
              head = session.head(download_url, timeout=(10, 30), allow_redirects=True)
              filename = get_filename(head)
              cache[URL] = {"url": download_url, "filename": filename}
              with open(CACHE_FILE, "w") as f:
                  json.dump(cache, f)

          filepath = os.path.join(BOOKS_DIR, filename)

          # Skip if already downloaded
          if os.path.exists(filepath) and os.path.getsize(filepath) > 0:
              print(f"Already exists: {filename}")
              raise SystemExit(0)

          # Resumable download
          MAX_ATTEMPTS = 10
          CHUNK = 65536

          for attempt in range(1, MAX_ATTEMPTS + 1):
              existing = os.path.getsize(filepath) if os.path.exists(filepath) else 0
              headers = {"Range": f"bytes={existing}-"} if existing else {}
              try:
                  r = session.get(download_url, headers=headers, stream=True, timeout=(10, 30))
                  total = existing + int(r.headers.get("Content-Length", 0))
                  downloaded = existing
                  speed = 0
                  last_time = time.time()
                  last_bytes = existing

                  with open(filepath, "ab") as f:
                      for chunk in r.iter_content(CHUNK):
                          if not chunk:
                              continue
                          f.write(chunk)
                          downloaded += len(chunk)
                          now = time.time()
                          elapsed = now - last_time
                          if elapsed >= 0.5:
                              speed = (downloaded - last_bytes) / elapsed
                              last_bytes = downloaded
                              last_time = nowpct = downloaded / total * 100 if total else 0
                          eta = (total - downloaded) / speed if speed > 0 else 0
                          bar = "█" * int(pct // 5) + "░" * (20 - int(pct // 5))
                          print(f"\r[{bar}] {pct:.1f}% {format_size(downloaded)}/{format_size(total)} "
                                f"@ {format_size(speed)}/s ETA {format_eta(eta) if speed else '?'}   ",
                                end="", flush=True)

                  print(f"\nDone: {filename}")
                  break

              except Exception as e:
                  wait = min(2 ** attempt, 30)
                  print(f"\nAttempt {attempt} failed: {e}. Retrying in {wait}s...")
                  time.sleep(wait)
          else:
              raise SystemExit("Download failed after all attempts")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add books/ .url_cache.json
          git diff --cached --quiet || git commit -m "Add downloaded book"
          git push
